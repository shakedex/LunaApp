# Luna Release - Build and Publish Installers
# Manually triggered workflow to create versioned releases with Velopack installers

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version override (leave blank to use <Version> from LunaApp.csproj)'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Resolves the version that all downstream jobs use. Either takes the
  # workflow input (if non-empty) or falls back to <Version> in the csproj.
  # Keeps versioning centralized in one place — bumping requires editing
  # exactly one line in LunaApp.csproj.
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: set
        run: |
          input='${{ inputs.version }}'
          if [ -n "$input" ]; then
            v="$input"
            echo "Using workflow input override: $v"
          else
            v=$(grep -oP '(?<=<Version>)[^<]+' LunaApp.csproj | head -1)
            echo "Using <Version> from LunaApp.csproj: $v"
          fi
          if [ -z "$v" ]; then
            echo "::error::Could not resolve a version (input empty and <Version> not found in csproj)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: resolve-version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Restore dependencies
        run: dotnet restore LunaApp.csproj -r win-x64

      - name: Publish application (self-contained + trimmed)
        run: |
          dotnet publish LunaApp.csproj -c Release -r win-x64 --self-contained true -o ./publish/win-x64 `
            /p:Version=${{ needs.resolve-version.outputs.version }} `
            /p:PublishTrimmed=true `
            /p:TrimMode=partial `
            /p:PublishSingleFile=false

      - name: Verify runtime is bundled
        run: |
          if (Test-Path "./publish/win-x64/System.Private.CoreLib.dll") {
            Write-Host "✓ .NET runtime bundled successfully" -ForegroundColor Green
          } else {
            Write-Error "✗ Runtime NOT bundled - self-contained build failed!"
            exit 1
          }

      - name: Create Velopack installer
        run: |
          vpk pack `
            --packId "Luna" `
            --packVersion ${{ needs.resolve-version.outputs.version }} `
            --packDir ./publish/win-x64 `
            --mainExe Luna.exe `
            --outputDir ./releases/win-x64 `
            --packAuthors "Luna" `
            --packTitle "Luna - Camera Report Generator"

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luna-win-x64-installer
          path: ./releases/win-x64/*
          retention-days: 30

  build-macos-arm:
    needs: resolve-version
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Restore dependencies
        run: dotnet restore LunaApp.csproj -r osx-arm64

      - name: Set executable permissions on bundled tools
        run: |
          chmod +x ./tools/ffmpeg/osx-arm64/* || true

      - name: Publish application (self-contained + trimmed)
        run: |
          dotnet publish LunaApp.csproj -c Release -r osx-arm64 --self-contained true -o ./publish/osx-arm64 \
            /p:Version=${{ needs.resolve-version.outputs.version }} \
            /p:PublishTrimmed=true \
            /p:TrimMode=partial \
            /p:PublishSingleFile=false

      - name: Verify runtime is bundled
        run: |
          if [ -f "./publish/osx-arm64/System.Private.CoreLib.dll" ]; then
            echo "✓ .NET runtime bundled successfully"
          else
            echo "✗ Runtime NOT bundled - self-contained build failed!"
            exit 1
          fi

      - name: Set executable permissions on published app
        run: |
          chmod +x ./publish/osx-arm64/Luna
          chmod +x ./publish/osx-arm64/tools/ffmpeg/osx-arm64/* || true

      - name: Create Velopack installer (DMG)
        run: |
          vpk pack \
            --packId "Luna" \
            --packVersion ${{ needs.resolve-version.outputs.version }} \
            --packDir ./publish/osx-arm64 \
            --mainExe Luna \
            --outputDir ./releases/osx-arm64 \
            --packAuthors "Luna" \
            --packTitle "Luna - Camera Report Generator"

      - name: Upload macOS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luna-osx-arm64-installer
          path: ./releases/osx-arm64/*
          retention-days: 30

  create-release:
    needs: [resolve-version, build-windows, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: luna-win-x64-installer
          path: ./artifacts/win-x64

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: luna-osx-arm64-installer
          path: ./artifacts/osx-arm64

      - name: List artifacts
        run: |
          echo "=== Windows Artifacts ==="
          ls -la ./artifacts/win-x64/
          echo ""
          echo "=== macOS Artifacts ==="
          ls -la ./artifacts/osx-arm64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: Luna v${{ needs.resolve-version.outputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            ./artifacts/win-x64/*
            ./artifacts/osx-arm64/*
          body: |
            ## Installation

            ### Windows
            1. Download `Luna-${{ needs.resolve-version.outputs.version }}-win-x64-Setup.exe`
            2. Run the installer - if SmartScreen appears, click "More info" → "Run anyway"
            3. Follow the installation wizard

            ### macOS (Apple Silicon)
            1. Download `Luna-${{ needs.resolve-version.outputs.version }}-osx-arm64.dmg`
            2. Open the DMG and drag Luna to Applications
            3. First launch: Right-click Luna → Open → Click "Open" in the dialog
            4. **Important:** Run this command in Terminal to enable bundled tools:
               ```
               xattr -cr /Applications/Luna.app
               ```

            See [Installation Guide](https://github.com/shakedex/LunaApp/blob/master/docs/INSTALLATION.md) for detailed instructions.
            
            ---
            *Built with .NET 10 runtime included - no additional installation required.*
